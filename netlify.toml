[build]
  command = "pnpm install --no-frozen-lockfile && pnpm run build"
  publish = "dist/public"

# SPA fallback: serve index.html for all client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashed build assets never change — cache them forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Privacy & hardening for every response. Referrer-Policy matters for an
# adult site: visitors' browsers won't leak the page they came from when
# they follow outbound links.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
